replicaCount: 2

image:
  repository: 313588187261.dkr.ecr.eu-north-1.amazonaws.com/lesson-5-ecr
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8000

health:
  path: /
  
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

alerts:
  enabled: true
  cpuThresholdPercent: 70
  for: 5m
  severity: warning
  prometheusRuleLabels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/instance: monitoring

config:
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  POSTGRES_USER: myuser
  POSTGRES_DB: mydb
  POSTGRES_PASSWORD: mypassword

  SECRET_KEY: "django-secret-key"
  DEBUG: "True"
  ALLOWED_HOSTS: "*"